<!-- Availability Widget -->
<div class="max-w-5xl mx-auto px-4" x-data="availabilityWidget()">
    <div class="bg-card/95 backdrop-blur-md border border-border p-6 rounded-lg shadow-2xl">
        <form @submit.prevent="checkAvailability" class="flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:w-auto flex-1">
                <label class="block text-sm font-medium text-muted-foreground mb-2" for="aw-check-in">Check-in</label>
                <input id="aw-check-in" type="date" x-model="checkIn" required 
                       class="w-full bg-background border border-border rounded-sm px-4 py-3 text-foreground focus:outline-none focus:border-primary transition-colors" 
                       :min="today">
            </div>
            <div class="w-full md:w-auto flex-1">
                <label class="block text-sm font-medium text-muted-foreground mb-2" for="aw-check-out">Check-out</label>
                <input id="aw-check-out" type="date" x-model="checkOut" required 
                       class="w-full bg-background border border-border rounded-sm px-4 py-3 text-foreground focus:outline-none focus:border-primary transition-colors" 
                       :min="checkIn || today">
            </div>
            <div class="w-full md:w-auto">
                <label class="block text-sm font-medium text-muted-foreground mb-2" for="aw-rooms">Rooms</label>
                <select id="aw-rooms" x-model="rooms" 
                        class="w-full bg-background border border-border rounded-sm px-4 py-3 text-foreground focus:outline-none focus:border-primary transition-colors">
                    <option value="1">1 Room</option>
                    <option value="2">2 Rooms</option>
                    <option value="3">3 Rooms</option>
                    <option value="4">4 Rooms</option>
                    <option value="5">5 Rooms</option>
                </select>
            </div>
            <div class="w-full md:w-auto">
                <label class="block text-sm font-medium text-muted-foreground mb-2" for="aw-guests">Guests</label>
                <select id="aw-guests" x-model="guests" 
                        class="w-full bg-background border border-border rounded-sm px-4 py-3 text-foreground focus:outline-none focus:border-primary transition-colors">
                    <option value="1">1 Guest</option>
                    <option value="2">2 Guests</option>
                    <option value="3">3 Guests</option>
                    <option value="4">4 Guests</option>
                    <option value="5">5 Guests</option>
                    <option value="6">6 Guests</option>
                    <option value="7">7 Guests</option>
                    <option value="8">8 Guests</option>
                </select>
            </div>
            <div class="w-full md:w-auto">
                <button id="aw-check-btn" type="submit" 
                        class="w-full bg-primary text-primary-foreground px-8 py-3 rounded-sm tracking-widest hover:bg-primary/90 transition-colors uppercase font-medium h-[50px] whitespace-nowrap" 
                        :disabled="loading">
                    <span x-show="!loading">Check</span>
                    <span x-show="loading">…</span>
                </button>
            </div>
        </form>
        
        <div x-show="message" x-transition class="mt-4 p-4 rounded-sm flex items-center justify-between" 
             :class="{
                 'bg-green-900/20 text-green-400 border border-green-800/50': status === 'available',
                 'bg-yellow-900/20 text-yellow-400 border border-yellow-800/50': status === 'limited',
                 'bg-red-900/20 text-red-400 border border-red-800/50': status === 'unavailable' || status === 'error'
             }">
            <p x-text="message" class="text-sm"></p>
            <button x-show="status === 'available' || status === 'limited'" 
                    @click="openBookingModal" 
                    id="aw-book-now-btn"
                    class="ml-4 bg-transparent border border-current px-4 py-2 text-xs uppercase tracking-wider hover:bg-white/10 transition-colors rounded-sm whitespace-nowrap">
                Book Now
            </button>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        if (!Alpine.store('availabilityWidgetData')) {
            Alpine.data('availabilityWidget', () => ({
                checkIn:  '',
                checkOut: '',
                guests:   '2',
                rooms:    '1',
                loading:  false,
                message:  '',
                status:   '',
                today:    new Date().toISOString().split('T')[0],

                async checkAvailability() {
                    this.loading = true;
                    this.message = '';
                    this.status  = '';
                    try {
                        const response = await fetch('/api/check-availability', {
                            method:  'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'X-CSRFToken':  '{{ csrf_token() }}',
                            },
                            body: JSON.stringify({
                                checkIn:  this.checkIn,
                                checkOut: this.checkOut,
                                guests:   this.guests,
                                rooms:    this.rooms,
                            }),
                        });
                        const data = await response.json();
                        if (!response.ok) {
                            this.status  = 'error';
                            this.message = data.error || 'An error occurred';
                        } else {
                            this.status  = data.status;
                            this.message = data.message;
                        }
                    } catch (err) {
                        this.status  = 'error';
                        this.message = 'Network error. Please try again.';
                    } finally {
                        this.loading = false;
                    }
                },

                openBookingModal() {
                    window.dispatchEvent(new CustomEvent('open-booking-modal', {
                        detail: {
                            checkIn:  this.checkIn,
                            checkOut: this.checkOut,
                            guests:   this.guests,
                            rooms:    this.rooms,
                        },
                    }));
                },
            }));
            Alpine.store('availabilityWidgetData', true);
        }
    });
</script>
