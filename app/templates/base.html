<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Experience the unfiltered beauty of the mountains at Shrine Home Stay. A handcrafted sanctuary offering luxury, peace, and authenticity.">
    <meta property="og:title" content="Shrine Home Stay - Luxury Mountain Retreat">
    <meta property="og:description" content="A handcrafted sanctuary offering luxury, peace, and authenticity in the mountains.">
    <meta property="og:type" content="website">
    <meta name="robots" content="index, follow">
    <title>{% block title %}Shrine | Home Stay{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (via CDN for development/simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#0f0d0c',
                        foreground: '#fafafa',
                        primary: '#D4AF37',
                        'primary-foreground': '#000000',
                        muted: '#262626',
                        'muted-foreground': '#a3a3a3',
                        border: '#262626',
                        card: '#171717',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="preload" href="{{ url_for('static', filename='css/style.css') }}" as="style">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_head %}{% endblock %}
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-background text-foreground font-sans antialiased min-h-screen flex flex-col" x-data="{ scrolled: false, mobileMenuOpen: false }" @scroll.window="scrolled = (window.pageYOffset > 50)">
    
    {% include 'components/navbar.html' %}
    
    <main class="flex-1">
        {% include 'components/_alerts.html' %}
        
        {% block content %}{% endblock %}
    </main>
    
    <!-- WhatsApp Floating Button -->
    <div x-data="{
        baseMsg: 'Hello! I am interested in Shrine Home Stay.',
        get whatsappLink() {
            let msg = this.baseMsg;
            // Try to get dates from the availability widget if present
            const checkInInput = document.querySelector('input[x-model=\'checkIn\']');
            const checkOutInput = document.querySelector('input[x-model=\'checkOut\']');
            if (checkInInput && checkOutInput && checkInInput.value && checkOutInput.value) {
                msg += ` I would like to request availability from ${checkInInput.value} to ${checkOutInput.value}.`;
            }
            return `https://wa.me/1234567890?text=${encodeURIComponent(msg)}`;
        }
    }" class="fixed bottom-6 right-6 z-50">
        <a :href="whatsappLink" target="_blank" class="flex items-center justify-center w-14 h-14 bg-green-500 text-white rounded-full shadow-lg hover:bg-green-600 hover:scale-110 transition-all duration-300">
            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
            </svg>
        </a>
    </div>
    
    {% include 'components/footer.html' %}
    
    {% block extra_scripts %}{% endblock %}
    {% include 'main/components/booking_modal.html' ignore missing %}
</body>
</html>
