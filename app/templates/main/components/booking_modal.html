<!-- Booking Enquiry Modal — powered by PricingEngine via /api/calculate-price -->
<div x-data="bookingModal()" 
     @open-booking-modal.window="openModal($event.detail)"
     class="relative z-50" 
     aria-labelledby="booking-modal-title" 
     role="dialog" 
     aria-modal="true"
     x-show="isOpen"
     x-cloak>
    
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-background/80 backdrop-blur-sm transition-opacity" 
         x-show="isOpen"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="isOpen = false"></div>

    <!-- Modal -->
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden bg-card text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-2xl border border-border rounded-lg"
                 x-show="isOpen"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 @click.stop>
                
                <!-- Close -->
                <div class="absolute right-0 top-0 hidden pr-4 pt-4 sm:block">
                    <button type="button" class="rounded-md text-muted-foreground hover:text-foreground focus:outline-none" @click="isOpen = false" id="booking-modal-close-btn">
                        <span class="sr-only">Close</span>
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <div class="px-4 pb-4 pt-5 sm:p-8 sm:pb-6">
                    <h3 class="text-2xl font-serif leading-6 text-foreground mb-6" id="booking-modal-title">Booking Enquiry</h3>
                    
                    <!-- Success State -->
                    <div x-show="status === 'success'" class="bg-green-900/20 text-green-400 border border-green-800/50 p-6 rounded-sm mb-6">
                        <h4 class="font-serif text-lg mb-2">Request Received!</h4>
                        <p x-text="message" class="text-sm"></p>
                        <button @click="isOpen = false" class="mt-4 text-xs uppercase tracking-widest text-primary hover:text-primary/80 transition-colors" id="booking-success-close-btn">Close</button>
                    </div>
                    
                    <!-- Error Banner -->
                    <div x-show="status === 'error'" class="bg-red-900/20 text-red-400 border border-red-800/50 p-4 rounded-sm mb-6">
                        <p x-text="message" class="text-sm"></p>
                    </div>

                    <!-- Form -->
                    <form @submit.prevent="submitBooking" x-show="status !== 'success'" class="space-y-5" id="booking-enquiry-form">
                        
                        <!-- Row 1: Dates -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-check-in">Check-in</label>
                                <input id="bm-check-in" type="date" x-model="formData.checkIn" @change="recalculate()" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-check-out">Check-out</label>
                                <input id="bm-check-out" type="date" x-model="formData.checkOut" @change="recalculate()" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                        </div>

                        <!-- Row 2: Room Type + Rooms + Guests -->
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-room-type">Room Type</label>
                                <select id="bm-room-type" x-model="formData.accommodationId" @change="onRoomTypeChange()" 
                                        class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                                    <template x-for="room in roomTypes" :key="room.id">
                                        <option :value="room.id" x-text="room.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-rooms">Rooms</label>
                                <select id="bm-rooms" x-model="formData.rooms" @change="onRoomsChange()" 
                                        class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                                    <template x-for="n in maxRooms" :key="n">
                                        <option :value="n" x-text="n + (n === 1 ? ' Room' : ' Rooms')"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-guests">Guests</label>
                                <select id="bm-guests" x-model="formData.guests" @change="onGuestsChange()" 
                                        class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                                    <template x-for="n in maxGuests" :key="n">
                                        <option :value="n" x-text="n + (n === 1 ? ' Guest' : ' Guests')"></option>
                                    </template>
                                </select>
                            </div>
                        </div>

                        <!-- Row 3: Personal Details -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-name">Full Name</label>
                                <input id="bm-name" type="text" x-model="formData.fullName" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-phone">Phone Number</label>
                                <input id="bm-phone" type="tel" x-model="formData.phone" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-email">Email</label>
                            <input id="bm-email" type="email" x-model="formData.email" required 
                                   class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                        </div>

                        <!-- Add-ons -->
                        <template x-if="currentRoomPackages.length > 0">
                            <div class="bg-muted/20 border border-border/60 p-4 rounded-sm">
                                <h4 class="text-sm font-medium text-foreground mb-3">Optional Add-ons</h4>
                                <template x-for="pkg in currentRoomPackages" :key="pkg.id">
                                    <label class="flex items-start space-x-3 cursor-pointer py-1">
                                        <input type="checkbox" :value="pkg.id" 
                                               @change="togglePackage(pkg.id)"
                                               :checked="formData.packageId == pkg.id"
                                               class="mt-1 h-4 w-4 rounded border-border text-primary focus:ring-primary">
                                        <div>
                                            <span class="block text-sm font-medium text-foreground" 
                                                  x-text="pkg.name + ' — ₹' + pkg.price + (pkg.is_per_guest ? '/guest/night' : '/night')"></span>
                                            <span class="block text-xs text-muted-foreground" x-text="pkg.description"></span>
                                        </div>
                                    </label>
                                </template>
                            </div>
                        </template>

                        <!-- Special Requests -->
                        <div>
                            <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-requests">Special Requests (Optional)</label>
                            <textarea id="bm-requests" rows="2" x-model="formData.specialRequests" 
                                      class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary resize-none"></textarea>
                        </div>

                        <!-- ── Price Breakdown Panel ── -->
                        <div class="border border-border rounded-sm overflow-hidden">
                            <!-- Calculating spinner -->
                            <div x-show="calculating" class="p-4 text-center text-muted-foreground text-sm animate-pulse">
                                Calculating price…
                            </div>

                            <!-- Occupancy error -->
                            <div x-show="!calculating && priceData && !priceData.is_valid" 
                                 class="p-4 bg-red-900/15 border-b border-red-800/40 text-red-400 text-sm">
                                <div class="flex gap-2">
                                    <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                                    </svg>
                                    <span x-text="priceData.validation_error"></span>
                                </div>
                            </div>

                            <!-- No dates selected prompt -->
                            <div x-show="!calculating && !priceData && (!formData.checkIn || !formData.checkOut)" 
                                 class="p-4 text-muted-foreground text-sm italic text-center">
                                Select check-in and check-out dates to see pricing.
                            </div>

                            <!-- Detailed breakdown (only when valid) -->
                            <template x-if="!calculating && priceData && priceData.is_valid">
                                <div>
                                    <!-- Header row -->
                                    <div class="bg-muted/30 px-4 py-2 border-b border-border">
                                        <div class="flex justify-between items-center text-xs text-muted-foreground uppercase tracking-wider">
                                            <span>Cost Breakdown</span>
                                            <span x-text="priceData.nights + ' night' + (priceData.nights !== 1 ? 's' : '')"></span>
                                        </div>
                                    </div>

                                    <!-- Per-room rows -->
                                    <div class="px-4 py-3 space-y-2">
                                        <template x-for="room in priceData.rooms" :key="room.room_number">
                                            <div class="flex justify-between items-center text-sm">
                                                <span class="text-muted-foreground"
                                                      x-text="'Room ' + room.room_number + ' (' + room.guests_in_room + ' guest' + (room.guests_in_room !== 1 ? 's' : '') + ') — ₹' + room.rate_per_night.toLocaleString('en-IN') + '/night × ' + priceData.nights + ' night' + (priceData.nights !== 1 ? 's' : '')"></span>
                                                <span class="text-foreground font-medium" x-text="'₹' + room.room_total.toLocaleString('en-IN')"></span>
                                            </div>
                                        </template>

                                        <!-- Meal package row -->
                                        <template x-if="priceData.meal_charges > 0">
                                            <div class="flex justify-between items-center text-sm">
                                                <span class="text-muted-foreground" 
                                                      x-text="(priceData.package_name || 'Meal Package') + ' (' + priceData.total_guests + ' guests × ' + priceData.nights + ' nights)'"></span>
                                                <span class="text-foreground" x-text="'₹' + priceData.meal_charges.toLocaleString('en-IN')"></span>
                                            </div>
                                        </template>

                                        <!-- Subtotal + tax separator -->
                                        <div class="border-t border-border pt-2 mt-2 space-y-1.5">
                                            <template x-if="priceData.tax > 0">
                                                <div class="flex justify-between items-center text-sm text-muted-foreground">
                                                    <span>Subtotal</span>
                                                    <span x-text="'₹' + priceData.subtotal.toLocaleString('en-IN')"></span>
                                                </div>
                                            </template>
                                            <template x-if="priceData.tax > 0">
                                                <div class="flex justify-between items-center text-sm text-muted-foreground">
                                                    <span>Tax</span>
                                                    <span x-text="'₹' + priceData.tax.toLocaleString('en-IN')"></span>
                                                </div>
                                            </template>
                                            <div class="flex justify-between items-center pt-1">
                                                <span class="font-semibold text-foreground text-sm">Total</span>
                                                <span class="font-bold text-primary text-xl" x-text="'₹' + priceData.total.toLocaleString('en-IN')"></span>
                                            </div>
                                            <p class="text-xs text-muted-foreground mt-1">Final amount confirmed on booking.</p>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Actions -->
                        <div class="flex flex-col sm:flex-row sm:flex-row-reverse gap-3 pt-1">
                            <button type="submit" id="booking-submit-btn"
                                    class="w-full sm:w-auto inline-flex justify-center rounded-sm bg-primary px-6 py-3 text-sm font-semibold uppercase tracking-wider text-primary-foreground shadow-sm hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed"
                                    :disabled="loading || calculating || (priceData && !priceData.is_valid)">
                                <span x-show="!loading">Submit Request</span>
                                <span x-show="loading">Submitting…</span>
                            </button>
                            <button type="button" id="booking-cancel-btn"
                                    class="w-full sm:w-auto inline-flex justify-center rounded-sm bg-transparent border border-border px-6 py-3 text-sm font-semibold uppercase tracking-wider text-foreground hover:bg-white/5"
                                    @click="isOpen = false" :disabled="loading">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('bookingModal', () => ({
            isOpen:      false,
            loading:     false,
            calculating: false,
            status:      '',
            message:     '',
            roomTypes:   [],
            priceData:   null,      // PriceBreakdown from /api/calculate-price
            _calcTimer:  null,      // debounce timer

            formData: {
                checkIn:          '',
                checkOut:         '',
                rooms:            1,
                guests:           2,
                accommodationId:  '',
                packageId:        null,
                fullName:         '',
                email:            '',
                phone:            '',
                specialRequests:  '',
            },

            // ── Derived ────────────────────────────────────────────────────────

            get currentRoom() {
                return this.roomTypes.find(r => r.id == this.formData.accommodationId);
            },

            get currentRoomPackages() {
                return this.currentRoom ? this.currentRoom.packages : [];
            },

            /**
             * Max rooms = physical inventory of this room type only.
             * NOT limited by guest count — the backend validates per-room
             * occupancy. Guests simply cannot be fewer than rooms selected.
             */
            get maxRooms() {
                const inv = this.currentRoom ? this.currentRoom.internal_count : 5;
                return Array.from({ length: inv }, (_, i) => i + 1);
            },

            /**
             * Max guests = total inventory × per-room capacity.
             * Lets the user pick guests freely; the price panel
             * validates and explains any occupancy errors inline.
             */
            get maxGuests() {
                const perRoom    = this.currentRoom ? this.currentRoom.capacity : 4;
                const totalRooms = this.currentRoom ? this.currentRoom.internal_count : 5;
                const max = perRoom * totalRooms;
                return Array.from({ length: max }, (_, i) => i + 1);
            },

            // ── Lifecycle ──────────────────────────────────────────────────────

            async init() {
                try {
                    const res = await fetch('/api/accommodations/pricing');
                    if (res.ok) {
                        this.roomTypes = await res.json();
                        if (this.roomTypes.length > 0) {
                            this.formData.accommodationId = this.roomTypes[0].id;
                        }
                    }
                } catch (e) {
                    console.error('Failed to fetch pricing data', e);
                }
            },

            openModal(details) {
                this.isOpen  = true;
                this.status  = '';
                this.message = '';
                this.priceData = null;

                if (details) {
                    this.formData.checkIn  = details.checkIn  || '';
                    this.formData.checkOut = details.checkOut || '';
                    this.formData.rooms    = parseInt(details.rooms)  || 1;
                    this.formData.guests   = parseInt(details.guests) || 2;
                    if (details.accommodationId) {
                        this.formData.accommodationId = details.accommodationId;
                    }
                    if (this.formData.checkIn && this.formData.checkOut) {
                        this.recalculate();
                    }
                }
            },

            // ── Event handlers ─────────────────────────────────────────────────

            /**
             * Room type changed → reset package, clamp rooms/guests to new
             * type's inventory and capacity limits, then recalculate.
             */
            onRoomTypeChange() {
                this.formData.packageId = null;

                const maxRooms   = this.currentRoom ? this.currentRoom.internal_count : 5;
                const maxGuests  = this.currentRoom
                    ? this.currentRoom.capacity * this.currentRoom.internal_count
                    : 20;

                if (parseInt(this.formData.rooms) > maxRooms) {
                    this.formData.rooms = maxRooms;
                }
                if (parseInt(this.formData.guests) > maxGuests) {
                    this.formData.guests = maxGuests;
                }
                this.recalculate();
            },

            /**
             * Number of ROOMS changed → ensure guests >= rooms (each room
             * needs at least 1 guest).  Price recalculates immediately.
             */
            onRoomsChange() {
                const rooms    = parseInt(this.formData.rooms)  || 1;
                const guests   = parseInt(this.formData.guests) || 1;

                // If rooms now exceed guests, bump guests up to match rooms.
                // (Cannot have empty rooms.)
                if (rooms > guests) {
                    this.formData.guests = rooms;
                }
                this.recalculate();
            },

            /**
             * Number of GUESTS changed → if guests drop below current room
             * count, reduce rooms to match.  Never leave rooms > guests.
             */
            onGuestsChange() {
                const guests   = parseInt(this.formData.guests) || 1;
                const maxRooms = this.currentRoom ? this.currentRoom.internal_count : 5;
                let   rooms    = parseInt(this.formData.rooms)  || 1;

                // Each room needs at least 1 guest — reduce rooms if guests fell below.
                if (rooms > guests) rooms = guests;
                // Never exceed physical inventory.
                if (rooms > maxRooms) rooms = maxRooms;
                // Always at least 1 room.
                if (rooms < 1) rooms = 1;

                this.formData.rooms = rooms;
                this.recalculate();
            },

            togglePackage(pkgId) {
                this.formData.packageId = (this.formData.packageId == pkgId) ? null : pkgId;
                this.recalculate();
            },

            /** Debounced recalculate — fires 300 ms after last change. */
            recalculate() {
                clearTimeout(this._calcTimer);
                this._calcTimer = setTimeout(() => this._fetchPrice(), 300);
            },

            async _fetchPrice() {
                const { checkIn, checkOut, accommodationId, rooms, guests, packageId } = this.formData;

                if (!checkIn || !checkOut || !accommodationId) {
                    this.priceData = null;
                    return;
                }

                this.calculating = true;
                try {
                    const resp = await fetch('/api/calculate-price', {
                        method:  'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body:    JSON.stringify({
                            checkIn,
                            checkOut,
                            accommodationId: parseInt(accommodationId),
                            rooms:           parseInt(rooms)   || 1,
                            guests:          parseInt(guests)  || 1,
                            packageId:       packageId ? parseInt(packageId) : null,
                        }),
                    });
                    this.priceData = await resp.json();
                } catch (e) {
                    console.error('Price calculation failed', e);
                    this.priceData = null;
                } finally {
                    this.calculating = false;
                }
            },

            // ── Submit ─────────────────────────────────────────────────────────

            async submitBooking() {
                // Client-side occupancy guard
                if (this.priceData && !this.priceData.is_valid) {
                    this.status  = 'error';
                    this.message = this.priceData.validation_error;
                    return;
                }

                this.loading = true;
                this.status  = '';
                this.message = '';

                try {
                    const payload = {
                        ...this.formData,
                        rooms:  parseInt(this.formData.rooms)  || 1,
                        guests: parseInt(this.formData.guests) || 1,
                    };
                    if (!payload.packageId) payload.packageId = null;

                    const response = await fetch('/api/booking-request', {
                        method:  'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken':  '{{ csrf_token() }}',
                        },
                        body: JSON.stringify(payload),
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        this.status  = 'error';
                        this.message = data.error || 'An error occurred. Please try again.';
                    } else {
                        this.status  = 'success';
                        this.message = 'Your booking request has been received. Our team will contact you shortly to confirm your reservation and arrange payment.';
                        // Clear personal fields but keep dates for UX
                        this.formData.fullName        = '';
                        this.formData.email           = '';
                        this.formData.phone           = '';
                        this.formData.specialRequests = '';
                        this.formData.packageId       = null;
                    }
                } catch (error) {
                    this.status  = 'error';
                    this.message = 'Network error. Please try again.';
                } finally {
                    this.loading = false;
                }
            },
        }));
    });
</script>
