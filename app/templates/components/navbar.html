<header class="fixed top-0 w-full z-50 transition-all duration-300" :class="{ 'bg-background/90 backdrop-blur-md border-b border-border py-4': scrolled || mobileMenuOpen, 'bg-transparent py-6': !scrolled && !mobileMenuOpen }">
    <div class="container mx-auto px-6 lg:px-12 flex items-center justify-between">
        <a href="{{ url_for('main.index') }}" class="font-serif text-2xl tracking-widest text-primary">SHRINE</a>
        
        <!-- Desktop Nav -->
        <nav class="hidden md:flex space-x-8 items-center text-sm tracking-wide">
            <a href="{{ url_for('main.accommodations') }}" class="hover:text-primary transition-colors">ACCOMMODATIONS</a>
            <a href="{{ url_for('main.gallery') }}" class="hover:text-primary transition-colors">GALLERY</a>
            <a href="{{ url_for('main.about') }}" class="hover:text-primary transition-colors">ABOUT</a>
            <a href="{{ url_for('main.contact') }}" class="hover:text-primary transition-colors">CONTACT</a>
        </nav>
        
        <div class="hidden md:block">
            <a href="{{ url_for('main.accommodations') }}" class="inline-block bg-primary text-primary-foreground px-6 py-2 rounded-sm text-sm tracking-widest hover:bg-primary/90 transition-colors uppercase">
                Reserve
            </a>
        </div>

        <!-- Mobile Menu Toggle -->
        <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden text-foreground">
            <svg x-show="!mobileMenuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            <svg x-show="mobileMenuOpen" style="display: none;" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
    </div>

    <!-- Mobile Nav -->
    <div x-show="mobileMenuOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-4"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-4"
         style="display: none;"
         class="md:hidden bg-background border-b border-border absolute top-full left-0 w-full py-4 px-6 flex flex-col space-y-4 shadow-lg">
        <a href="{{ url_for('main.accommodations') }}" class="text-sm tracking-wide hover:text-primary transition-colors block py-2">ACCOMMODATIONS</a>
        <a href="{{ url_for('main.gallery') }}" class="text-sm tracking-wide hover:text-primary transition-colors block py-2">GALLERY</a>
        <a href="{{ url_for('main.about') }}" class="text-sm tracking-wide hover:text-primary transition-colors block py-2">ABOUT</a>
        <a href="{{ url_for('main.contact') }}" class="text-sm tracking-wide hover:text-primary transition-colors block py-2">CONTACT</a>
        <a href="{{ url_for('main.accommodations') }}" class="text-center bg-primary text-primary-foreground px-6 py-3 rounded-sm text-sm tracking-widest hover:bg-primary/90 transition-colors uppercase mt-4 block">
            Reserve
        </a>
    </div>
</header>
