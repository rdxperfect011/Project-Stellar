<!-- Booking Enquiry Modal — powered by PricingEngine via /api/calculate-price -->
<div x-data="bookingModal()" 
     @open-booking-modal.window="openModal($event.detail)"
     class="relative z-50" 
     aria-labelledby="booking-modal-title" 
     role="dialog" 
     aria-modal="true"
     x-show="isOpen"
     x-cloak>
    
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-background/80 backdrop-blur-sm transition-opacity" 
         x-show="isOpen"
         x-transition:enter="ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         @click="isOpen = false"></div>

    <!-- Modal -->
    <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div class="relative transform overflow-hidden bg-card text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-2xl border border-border rounded-lg"
                 x-show="isOpen"
                 x-transition:enter="ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave="ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
                 x-transition:leave-end="opacity-0 translate-y-4 sm:translate-y-0 sm:scale-95"
                 @click.stop>
                
                <!-- Close -->
                <div class="absolute right-0 top-0 hidden pr-4 pt-4 sm:block">
                    <button type="button" class="rounded-md text-muted-foreground hover:text-foreground focus:outline-none" @click="isOpen = false" id="booking-modal-close-btn">
                        <span class="sr-only">Close</span>
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <div class="px-4 pb-4 pt-5 sm:p-8 sm:pb-6">
                    <h3 class="text-2xl font-serif leading-6 text-foreground mb-6" id="booking-modal-title">Booking Enquiry</h3>
                    
                    <!-- Success State -->
                    <div x-show="status === 'success'" class="bg-green-900/20 text-green-400 border border-green-800/50 p-6 rounded-sm mb-6">
                        <h4 class="font-serif text-lg mb-2">Request Received!</h4>
                        <p x-text="message" class="text-sm"></p>
                        <button @click="isOpen = false" class="mt-4 text-xs uppercase tracking-widest text-primary hover:text-primary/80 transition-colors" id="booking-success-close-btn">Close</button>
                    </div>
                    
                    <!-- Error Banner -->
                    <div x-show="status === 'error'" class="bg-red-900/20 text-red-400 border border-red-800/50 p-4 rounded-sm mb-6">
                        <p x-text="message" class="text-sm"></p>
                    </div>

                    <!-- Form -->
                    <form @submit.prevent="submitBooking" x-show="status !== 'success'" class="space-y-5" id="booking-enquiry-form">
                        
                        <!-- Row 1: Dates -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-check-in">Check-in</label>
                                <input id="bm-check-in" type="date" x-model="formData.checkIn" @change="validateDates()" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-check-out">Check-out</label>
                                <input id="bm-check-out" type="date" x-model="formData.checkOut" @change="validateDates()" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                        </div>

                        <!-- Row 2: Room Type + Rooms + Guests -->
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-room-type">Room Type</label>
                                <select id="bm-room-type" x-model="formData.accommodationId" 
                                        class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                                    <template x-for="room in roomTypes" :key="room.id">
                                        <option :value="room.id" x-text="room.name"></option>
                                    </template>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-rooms">Total Rooms</label>
                                <input id="bm-rooms" type="number" x-model.debounce.300ms.number="formData.rooms" min="1" max="10" required
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-guests">Total Guests</label>
                                <input id="bm-guests" type="number" x-model.debounce.300ms.number="formData.guests" min="1" required
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                        </div>



                        <!-- Row 3: Personal Details -->
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-name">Full Name</label>
                                <input id="bm-name" type="text" x-model="formData.fullName" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-phone">Phone Number</label>
                                <input id="bm-phone" type="tel" x-model="formData.phone" required 
                                       class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-email">Email</label>
                            <input id="bm-email" type="email" x-model="formData.email" required 
                                   class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary">
                        </div>

                        <!-- Add-ons -->
                        <div class="bg-muted/20 border border-border/60 p-4 rounded-sm">
                            <label class="flex items-start space-x-3 cursor-pointer py-1">
                                <input type="checkbox" x-model="formData.mealsChecked" 
                                       class="mt-1 h-4 w-4 rounded border-border text-primary focus:ring-primary">
                                <div>
                                    <span class="block text-sm font-medium text-foreground">Meals & Tea</span>
                                    <span class="block text-xs text-muted-foreground">₹500 per guest per night</span>
                                </div>
                            </label>
                        </div>

                        <!-- Special Requests -->
                        <div>
                            <label class="block text-sm font-medium text-muted-foreground mb-1" for="bm-requests">Special Requests (Optional)</label>
                            <textarea id="bm-requests" rows="2" x-model="formData.specialRequests" 
                                      class="w-full bg-background border border-border rounded-sm px-3 py-2 text-foreground focus:outline-none focus:border-primary resize-none"></textarea>
                        </div>

                        <!-- ── Price Breakdown Panel ── -->
                        <div x-show="!isPriceHidden" class="border border-border rounded-sm overflow-hidden p-4 bg-[#2a2a2a] font-mono text-sm">
                            <template x-if="!isDatesValid">
                                <div class="text-red-400 font-sans text-center">Unable to calculate price. Please check your selections.</div>
                            </template>
                            
                            <template x-if="isDatesValid && overCapacity">
                                <div class="text-[#C9A84C] font-sans text-center">
                                    &#9888; <span x-text="totalGuests"></span> guests exceed capacity for <span x-text="formData.rooms"></span> room(s).<br>
                                    Minimum <span x-text="suggestedRooms"></span> rooms needed.<br>
                                    <a href="#" @click.prevent="formData.rooms = suggestedRooms" class="text-[#C9A84C] hover:text-[#d4b654] font-bold underline mt-2 inline-block">&rarr; Suggest <span x-text="suggestedRooms"></span> Rooms</a>
                                </div>
                            </template>
                            
                            <template x-if="isDatesValid && !overCapacity && pricePerRoom === 0">
                                <div class="text-red-400 font-sans text-center">Unable to calculate price. Please check your selections.</div>
                            </template>
                            
                            <template x-if="isDatesValid && !overCapacity && pricePerRoom > 0">
                                <div class="space-y-2 text-[#cccccc]">
                                    <div class="text-[#888]">
                                        ₹<span x-text="formatPrice(pricePerRoom)"></span> per room &middot; 
                                        <span x-text="formData.rooms"></span> room(s) &middot; 
                                        <span x-text="nights"></span> night(s) &middot; 
                                        <span x-text="totalGuests"></span> guests
                                    </div>
                                    <template x-if="isRounding">
                                        <div class="text-[#888] text-xs">
                                            Priced at <span x-text="priceKey"></span> guests/room rate (rounded up)
                                        </div>
                                    </template>
                                    <template x-if="formData.mealsChecked">
                                        <div>
                                            + Meals &amp; Tea: ₹500 &times; <span x-text="totalGuests"></span> guests &times; <span x-text="nights"></span> nights = ₹<span x-text="formatPrice(mealsCost)"></span>
                                        </div>
                                    </template>
                                    <div class="border-t border-[#444] pt-2 mt-2 text-[#C9A84C] font-bold text-lg font-sans">
                                        Estimated Total: ₹<span x-text="formatPrice(totalCost)"></span>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <!-- Actions -->
                        <div class="flex flex-col sm:flex-row sm:flex-row-reverse gap-3 pt-1">
                            <button type="submit" id="booking-submit-btn"
                                    class="w-full sm:w-auto inline-flex justify-center rounded-sm bg-primary px-6 py-3 text-sm font-semibold uppercase tracking-wider text-primary-foreground shadow-sm hover:bg-primary/90 disabled:opacity-50 disabled:cursor-not-allowed"
                                    :disabled="loading || !isDatesValid || (!isPriceHidden && (pricePerRoom === 0 || overCapacity))">
                                <span x-show="!loading">Submit Request</span>
                                <span x-show="loading">Submitting…</span>
                            </button>
                            <button type="button" id="booking-cancel-btn"
                                    class="w-full sm:w-auto inline-flex justify-center rounded-sm bg-transparent border border-border px-6 py-3 text-sm font-semibold uppercase tracking-wider text-foreground hover:bg-white/5"
                                    @click="isOpen = false" :disabled="loading">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('bookingModal', () => ({
            isOpen:      false,
            loading:     false,
            calculating: false,
            status:      '',
            message:     '',
            roomTypes:   [],

            formData: {
                checkIn:          new Date().toISOString().split('T')[0],
                checkOut:         new Date(Date.now() + 86400000).toISOString().split('T')[0],
                rooms:            1,
                guests:           2,
                accommodationId:  '',
                mealsChecked:     false,
                fullName:         '',
                email:            '',
                phone:            '',
                specialRequests:  '',
            },

            // ── Derived ────────────────────────────────────────────────────────

            get currentRoom() {
                return this.roomTypes.find(r => r.id == this.formData.accommodationId);
            },

            get isPriceHidden() {
                return this.currentRoom && ['Triple Room', 'Four-Bed Room'].includes(this.currentRoom.name);
            },

            getPriceKey(totalGuests, totalRooms) {
                const perRoom = totalGuests / totalRooms;
                if (perRoom <= 2) return 2;
                if (perRoom <= 3) return 3;
                if (perRoom <= 4) return 4;
                return null;
            },

            get priceKey() {
                return this.getPriceKey(this.formData.guests, this.formData.rooms);
            },

            get overCapacity() {
                return this.priceKey === null;
            },

            get suggestedRooms() {
                return Math.ceil(this.formData.guests / 4);
            },

            get isRounding() {
                const perRoom = this.totalGuests / (parseInt(this.formData.rooms) || 1);
                return perRoom !== this.priceKey;
            },

            get pricePerRoom() {
                const roomName = this.currentRoom ? this.currentRoom.name : '';
                const type = (roomName || '').toLowerCase().includes('deluxe') ? 'deluxe' : 'standard';
                const key = this.priceKey;
                if (!key) return 0;
                
                const PRICES = {
                    standard: { 2: 1900, 3: 2600, 4: 3650 },
                    deluxe:   { 2: 2350, 3: 3350, 4: 4650 }
                };
                return PRICES[type][key] || 0;
            },

            get totalGuests() {
                return parseInt(this.formData.guests) || 1;
            },

            get nights() {
                if (!this.formData.checkIn || !this.formData.checkOut) return 0;
                const start = new Date(this.formData.checkIn);
                const end = new Date(this.formData.checkOut);
                const diffTime = end - start;
                return diffTime > 0 ? Math.ceil(diffTime / (1000 * 60 * 60 * 24)) : 0;
            },

            get isDatesValid() {
                return this.nights > 0;
            },

            get roomCost() {
                return this.pricePerRoom * parseInt(this.formData.rooms) * this.nights;
            },

            get mealsCost() {
                return this.formData.mealsChecked ? (500 * this.totalGuests * this.nights) : 0;
            },

            get totalCost() {
                return this.roomCost + this.mealsCost;
            },

            formatPrice(val) {
                return Number(val).toLocaleString('en-IN');
            },

            validateDates() {
                if (this.formData.checkIn && this.formData.checkOut) {
                    const start = new Date(this.formData.checkIn);
                    let end = new Date(this.formData.checkOut);
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    
                    if (start < today) {
                        this.formData.checkIn = today.toISOString().split('T')[0];
                        start.setTime(today.getTime());
                    }
                    
                    if (end <= start) {
                        const newEnd = new Date(start.getTime() + 86400000);
                        this.formData.checkOut = newEnd.toISOString().split('T')[0];
                    }
                }
            },

            // ── Lifecycle ──────────────────────────────────────────────────────

            init() {
                this.validateDates();
            },

            async openModal(details) {
                this.isOpen  = true;
                this.status  = '';
                this.message = '';

                // Lazy load pricing data
                if (this.roomTypes.length === 0) {
                    try {
                        const res = await fetch('/api/accommodations/pricing');
                        if (res.ok) {
                            this.roomTypes = await res.json();
                            if (this.roomTypes.length > 0 && !this.formData.accommodationId) {
                                this.formData.accommodationId = this.roomTypes[0].id;
                            }
                        }
                    } catch (e) {
                        console.error('Failed to fetch pricing data', e);
                    }
                }

                if (details) {
                    this.formData.checkIn  = details.checkIn  || new Date().toISOString().split('T')[0];
                    this.formData.checkOut = details.checkOut || new Date(Date.now() + 86400000).toISOString().split('T')[0];
                    this.formData.rooms    = parseInt(details.rooms)  || 1;
                    this.formData.guests   = parseInt(details.guests) || 2;
                    if (details.accommodationId) {
                        this.formData.accommodationId = details.accommodationId;
                    } else if (details.roomType) {
                        const matchedRoom = this.roomTypes.find(r => r.name === details.roomType);
                        if (matchedRoom) {
                            this.formData.accommodationId = matchedRoom.id;
                        }
                    }
                    this.validateDates();
                }
            },

            // ── Submit ─────────────────────────────────────────────────────────

            async submitBooking() {
                if (!this.isDatesValid || (!this.isPriceHidden && this.pricePerRoom === 0)) {
                    this.status = 'error';
                    this.message = 'Unable to calculate price. Please check your selections.';
                    return;
                }

                this.loading = true;
                this.status  = '';
                this.message = '';

                try {
                    const payload = {
                        ...this.formData,
                        rooms:  parseInt(this.formData.rooms)  || 1,
                        guests: this.totalGuests,
                        meals_checked: this.formData.mealsChecked
                    };

                    const response = await fetch('/api/booking-request', {
                        method:  'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken':  '{{ csrf_token() }}',
                        },
                        body: JSON.stringify(payload),
                    });
                    const data = await response.json();

                    if (!response.ok) {
                        this.status  = 'error';
                        this.message = data.error || 'An error occurred. Please try again.';
                    } else {
                        this.status  = 'success';
                        this.message = 'Your booking request has been received. Our team will contact you shortly to confirm your reservation and arrange payment.';
                        // Clear personal fields but keep dates for UX
                        this.formData.fullName        = '';
                        this.formData.email           = '';
                        this.formData.phone           = '';
                        this.formData.specialRequests = '';
                        this.formData.mealsChecked    = false;
                    }
                } catch (error) {
                    this.status  = 'error';
                    this.message = 'Network error. Please try again.';
                } finally {
                    this.loading = false;
                }
            },
        }));
    });
</script>
