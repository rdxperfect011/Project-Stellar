{% extends "base.html" %}

{% block title %}500 - Internal Server Error | Shrine{% endblock %}

    <div>
        <h1 class="text-6xl md:text-8xl font-serif text-red-500 mb-6">500</h1>
        <h2 class="text-2xl md:text-3xl font-medium text-foreground mb-4">Internal Server Error</h2>
